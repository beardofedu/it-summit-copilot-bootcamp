<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q&A — Accelerated Copilot Bootcamp: Fundamentals to Advanced</title>
  <style>
    :root {
      --copilot-bg: linear-gradient(135deg, #6e40c9 0%, #0969da 100%);
      --human-bg: linear-gradient(135deg, #1a7f37 0%, #2da44e 100%);
      --page-bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--page-bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1rem;
      text-align: center;
    }
    header .logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    header h1 { font-size: 1.6rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
    header p { color: var(--text-muted); font-size: 0.95rem; }
    header .badge {
      display: inline-block;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      color: var(--accent);
      margin-top: 0.75rem;
    }
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .loading { text-align: center; padding: 3rem; color: var(--text-muted); }
    .loading .spinner {
      display: inline-block;
      width: 2rem; height: 2rem;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .qa-count {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .qa-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .qa-card-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .qa-card-header .issue-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 0.1rem; }
    .qa-card-header .question-text { font-size: 1.05rem; font-weight: 600; line-height: 1.4; }
    .qa-card-header .issue-link {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: 0.3rem;
      display: block;
    }
    .qa-card-header .issue-link:hover { color: var(--accent); }
    .bubbles {
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    @media (max-width: 640px) { .bubbles { grid-template-columns: 1fr; } }
    .bubble {
      border-radius: 10px;
      overflow: hidden;
    }
    .bubble-header {
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .bubble.copilot .bubble-header { background: var(--copilot-bg); }
    .bubble.human .bubble-header { background: var(--human-bg); }
    .bubble-body {
      background: #0d1117;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 1rem;
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text);
      min-height: 80px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-body.empty { color: var(--text-muted); font-style: italic; }
    .bubble-body code {
      background: #161b22;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1em 0.4em;
      font-size: 0.85em;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
    }
    .bubble-body pre {
      background: #161b22;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    .bubble-body pre code { background: none; border: none; padding: 0; }
    .error-banner {
      background: #3d1f1f;
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      color: #f85149;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🤖</div>
    <h1>Accelerated Copilot Bootcamp: Fundamentals to Advanced</h1>
    <p>IT Summit — Attendee Q&amp;A</p>
    <div class="badge">🏷️ Questions answered by GitHub Copilot + community</div>
  </header>

  <main>
    <div id="app">
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading Q&amp;A from GitHub Issues…</div>
      </div>
    </div>
  </main>

  <footer>
    Powered by <a href="https://github.com/features/copilot" target="_blank">GitHub Copilot</a> &amp;
    <a href="https://github.com/beardofedu/it-summit-copilot-bootcamp/issues?q=label%3Aquestion" target="_blank">GitHub Issues</a>
    · <a href="https://github.com/beardofedu/it-summit-copilot-bootcamp" target="_blank">View Repository</a>
  </footer>

  <script>
    const REPO = 'beardofedu/it-summit-copilot-bootcamp';
    const API = `https://api.github.com/repos/${REPO}`;

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function basicMarkdown(text) {
      // Very basic markdown: code blocks, inline code, bold, headings
      return text
        .replace(/```[\s\S]*?```/g, m => {
          const code = m.slice(3, -3).replace(/^[a-z]*\n/, '');
          return `<pre><code>${escapeHtml(code)}</code></pre>`;
        })
        .replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function extractSection(text, sectionTitle) {
      // Extract content after a heading until the next --- or end
      const marker = `### ${sectionTitle}`;
      const start = text.indexOf(marker);
      if (start === -1) return null;
      const contentStart = text.indexOf('\n', start) + 1;
      const divider = text.indexOf('\n---', contentStart);
      const end = divider !== -1 ? divider : text.length;
      return text.slice(contentStart, end).trim();
    }

    function parseSummaryComment(body) {
      if (!body.includes('<!-- qa-summary -->')) return null;
      const aiAnswer = extractSection(body, '🤖 AI Answer (GitHub Copilot)');
      const humanAnswer = extractSection(body, '👤 Human Answer (Community)');
      return { aiAnswer, humanAnswer };
    }

    function renderCard(issue, summary) {
      const ai = summary?.aiAnswer || 'No AI answer has been posted yet.';
      const human = summary?.humanAnswer || 'No community answers yet.';
      const aiEmpty = ai.includes('No AI answer');
      const humanEmpty = human.includes('No community answers');

      return `
        <div class="qa-card">
          <div class="qa-card-header">
            <span class="issue-icon">❓</span>
            <div>
              <div class="question-text">${escapeHtml(issue.title)}</div>
              <a class="issue-link" href="${issue.html_url}" target="_blank">#${issue.number} · View on GitHub</a>
            </div>
          </div>
          <div class="bubbles">
            <div class="bubble copilot">
              <div class="bubble-header">🤖 AI Answer — GitHub Copilot</div>
              <div class="bubble-body ${aiEmpty ? 'empty' : ''}">${basicMarkdown(ai)}</div>
            </div>
            <div class="bubble human">
              <div class="bubble-header">👤 Human Answer — Community</div>
              <div class="bubble-body ${humanEmpty ? 'empty' : ''}">${basicMarkdown(human)}</div>
            </div>
          </div>
        </div>`;
    }

    async function fetchComments(issueNumber) {
      const res = await fetch(`${API}/issues/${issueNumber}/comments?per_page=50`);
      if (!res.ok) return [];
      return res.json();
    }

    async function loadQA() {
      const app = document.getElementById('app');
      try {
        const res = await fetch(`${API}/issues?labels=summarized&state=all&per_page=100`);
        if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
        const issues = await res.json();

        if (!issues.length) {
          app.innerHTML = `
            <div class="empty-state">
              <div class="icon">💬</div>
              <p>No summarized Q&amp;A yet.<br>Questions will appear here after the session.</p>
            </div>`;
          return;
        }

        const cards = await Promise.all(issues.map(async issue => {
          const comments = await fetchComments(issue.number);
          const summaryComment = comments.find(c => c.body.includes('<!-- qa-summary -->'));
          const summary = summaryComment ? parseSummaryComment(summaryComment.body) : null;
          return renderCard(issue, summary);
        }));

        app.innerHTML = `
          <div class="qa-count">Showing ${issues.length} answered question${issues.length !== 1 ? 's' : ''}</div>
          ${cards.join('')}`;
      } catch (err) {
        app.innerHTML = `
          <div class="error-banner">
            ⚠️ Could not load Q&amp;A: ${escapeHtml(err.message)}<br>
            <small>This site requires the repository to be public. <a href="https://github.com/${REPO}/issues?q=label%3Aquestion+label%3Asummarized" target="_blank" style="color:#f85149">View issues directly on GitHub.</a></small>
          </div>`;
      }
    }

    loadQA();
  </script>
</body>
</html>
